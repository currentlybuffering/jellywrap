name: Build Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-action/setup@v1

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build app
        working-directory: apps/desktop
        run: cargo tauri build ${{ matrix.args }}

      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        working-directory: apps/desktop
        run: |
          chmod +x build-dmg.sh
          ./build-dmg.sh
          mv src-tauri/target/release/bundle/dmg/JellyWrap_0.1.0_aarch64.dmg \
             src-tauri/target/release/bundle/dmg/JellyWrap_${{ github.ref_name }}_${{ matrix.target }}.dmg || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JellyWrap-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/macos/*.app
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
